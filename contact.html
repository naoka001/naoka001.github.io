<body>
    <!-- header -->

        <div id="container" class="clearfix">
            <h1 id="logo"><a href="./index.html"><span class="ribbon">&bowtie;</span> Naoka's Gallery</a></h1>

    <hr>
    <h1 class="title">Contact</h1>

    <form action="#">
        <div>
            <label for="name">お名前<span class="required">*</span></label>
            <td><input type="text" name="name"></td>
        </div>
        <div>
            <label for="email">メールアドレス<span class="required">*</span></label>
            <td><input type="email" name="email" placeholder="info@example.com"></td>
        </div>
        <div>
            <label for="comment">コメント<span class="required">*</span></label>
            <td><textarea name="comment" cols="80" rows="10"></textarea></td>

        </div>
        <p><input type="submit" value="送信" class="submitBtn"></p>
    </form>
