    <link rel="stylesheet" href="./dist/css/lightbox.css" />
    <script>
        $(function() {
            $("#aside ul li").click(function() {
                $("#aside ul li").removeClass('select');
                $(this).addClass('select');
                var aside = $(this).attr('id');
                if (aside == 'coding') {
                    $("#works a").hide();
                    $(".coding").fadeIn(1500);
                } else if (aside == 'illust') {
                   $("#works a").hide();
                    $(".illust").fadeIn(1500);
                } else if (aside == 'three') {
                    $("#works a").hide();
                    $(".three").fadeIn(1500);
                } else {
                    $("#works a").fadeIn(1500).show();
                }
            });
            
        });
    </script>
